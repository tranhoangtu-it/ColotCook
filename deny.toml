[advisories]
# Report known vulnerabilities as errors
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# yaml-rust is unmaintained but pulled in transitively via syntect (colotcook-cli).
# Ignored until syntect updates its dependency or an alternative is adopted.
ignore = [
    { id = "RUSTSEC-2024-0320", reason = "yaml-rust is an indirect dep via syntect; no safe upgrade available upstream" },
    { id = "RUSTSEC-2025-0141", reason = "bincode v1 is an indirect dep via syntect; no safe upgrade available upstream" },
]

[licenses]
# All allowed SPDX license identifiers
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "0BSD",
    "CDLA-Permissive-2.0",
]

# ring uses a non-standard license expression; allow it via the exceptions list.
exceptions = [
    { allow = ["MIT", "ISC", "OpenSSL"], name = "ring" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
