name: Bug Report
description: Report a bug in ColotCook
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1. Run `colotcook ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ColotCook Version
      description: Output of `colotcook --version`
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: AI Provider
      options:
        - Anthropic (Claude)
        - OpenAI (GPT)
        - Google (Gemini)
        - xAI (Grok)
        - Ollama (Local)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: macOS 14.5 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
