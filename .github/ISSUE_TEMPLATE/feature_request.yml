name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: We'd love to hear your ideas! Please describe the feature you'd like.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / UX
        - AI Providers
        - Tools
        - Plugins / Hooks
        - MCP Protocol
        - Sessions
        - Permissions / Security
        - Performance
        - Other
    validations:
      required: true
